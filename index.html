<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Me Browser</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="toolbar">
      <div class="toolbar-row">
        <div class="nav-controls">
          <button id="backButton" class="nav-btn" title="Back">←</button>
          <button id="forwardButton" class="nav-btn" title="Forward">→</button>
          <button id="reloadButton" class="nav-btn" title="Reload">⟳</button>
          <button id="homeButton" class="nav-btn" title="Home">⌂</button>
        </div>
        <input id="addressBar" type="text" class="address-bar" placeholder="Enter URL" autocomplete="off" />
        <button id="goButton" class="go-btn">Go</button>
        <div id="loadingSpinner" class="spinner hidden"></div>
        <button id="sidebarToggle" class="sidebar-toggle-btn" title="Settings">⚙️</button>
      </div>

      <!-- TABS BAR -->
      <div class="tabs-bar">
        <div id="tabsContainer" class="tabs-container"></div>
        <button id="newTabButton" class="new-tab-btn">+</button>
      </div>
    </header>

    <!-- MAIN CONTAINER -->
    <div class="main-container">
      <div id="webViewsContainer" class="webviews-container"></div>

      <!-- SIDEBAR -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <h2>Settings</h2>
          <button id="sidebarClose" class="sidebar-close-btn">✕</button>
        </div>

        <div class="sidebar-tabs">
          <button class="sidebar-tab active" data-tab="general">General</button>
          <button class="sidebar-tab" data-tab="bookmarks">⭐ Bookmarks</button>
          <button class="sidebar-tab" data-tab="advanced">Advanced</button>
        </div>

        <!-- GENERAL TAB -->
        <div class="sidebar-content active" id="general-tab">
          <div class="setting-group">
            <h3>Privacy & Security</h3>
            <label class="setting-label">
              <input id="adBlockToggle" type="checkbox" />
              <span>Ad Block</span>
            </label>
            <label class="setting-label">
              <input id="trackingToggle" type="checkbox" />
              <span>Tracking Protection</span>
            </label>
          </div>

          <div class="setting-group">
            <h3>Proxy Settings</h3>
            <label class="setting-label">
              <input id="proxyToggle" type="checkbox" />
              <span>Enable Proxy</span>
            </label>
            <div class="proxy-inputs">
              <input id="proxyHost" type="text" placeholder="Host" class="setting-input" />
              <input id="proxyPort" type="text" placeholder="Port" class="setting-input" />
              <button id="applyProxyButton" class="setting-btn">Apply</button>
            </div>
          </div>

          <div class="setting-group">
            <h3>Data</h3>
            <button id="clearCacheButton" class="setting-btn danger">Clear Cache</button>
          </div>
        </div>

        <!-- BOOKMARKS TAB -->
        <div class="sidebar-content" id="bookmarks-tab">
          <h3>Bookmarks</h3>
          <button id="bookmarkButton" class="setting-btn">+ Add Current Page</button>
          <div id="bookmarksList" class="bookmarks-list">
            <p class="empty-message">No bookmarks</p>
          </div>
        </div>

        <!-- ADVANCED TAB -->
        <div class="sidebar-content" id="advanced-tab">
          <div class="setting-group">
            <h3>Private Window</h3>
            <button id="privateWindowButton" class="setting-btn">🔐 Open Private Window</button>
          </div>
          <div class="setting-group">
            <h3>Clear All Data</h3>
            <button id="clearAllData" class="setting-btn danger">Delete Everything</button>
          </div>
        </div>
      </aside>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>

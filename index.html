<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Me Browser</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="toolbar">
      <div class="nav-row">
        <button id="backButton" title="Back">←</button>
        <button id="forwardButton" title="Forward">→</button>
        <button id="reloadButton" title="Reload">⟳</button>
        <button id="homeButton" title="Home">⌂</button>
        <input id="addressBar" type="text" placeholder="Enter URL" autocomplete="off" />
        <button id="goButton">Go</button>
        <div id="loadingSpinner" class="spinner hidden" aria-live="polite"></div>
        <button id="sidebarToggle" class="sidebar-toggle-btn" title="Toggle Sidebar">⚙️</button>
      </div>
      <div class="settings-row">
        <label><input id="adBlockToggle" type="checkbox" /> Ad Block</label>
        <label><input id="trackingToggle" type="checkbox" /> Tracking Protection</label>
        <label><input id="proxyToggle" type="checkbox" /> Proxy</label>
        <input id="proxyHost" type="text" placeholder="Proxy host" />
        <input id="proxyPort" type="text" placeholder="Port" />
        <button id="applyProxyButton">Apply Proxy</button>
        <button id="clearCacheButton">Clear Cache</button>
      </div>
      <div class="bookmark-row">
        <button id="bookmarkButton">☆ Bookmark</button>
        <select id="bookmarkList">
          <option value="">Bookmarks</option>
        </select>
        <span id="statusText"></span>
      </div>
    </header>

    <div class="main-container">
      <div id="webViewsContainer" class="webviews-container"></div>

      <!-- SIDEBAR -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <h2>Settings</h2>
          <button id="sidebarClose" class="sidebar-close-btn">✕</button>
        </div>

        <div class="sidebar-tabs">
          <button class="sidebar-tab active" data-tab="general">General</button>
          <button class="sidebar-tab" data-tab="extensions">🧩 Extensions</button>
          <button class="sidebar-tab" data-tab="bookmarks">⭐ Bookmarks</button>
          <button class="sidebar-tab" data-tab="advanced">Advanced</button>
        </div>

        <!-- GENERAL TAB -->
        <div class="sidebar-content active" id="general-tab">
          <div class="setting-group">
            <h3>Privacy & Security</h3>
            <label class="setting-label">
              <input id="adBlockToggleSidebar" type="checkbox" />
              <span>Ad Block</span>
            </label>
            <label class="setting-label">
              <input id="trackingToggleSidebar" type="checkbox" />
              <span>Tracking Protection</span>
            </label>
          </div>

          <div class="setting-group">
            <h3>Proxy Settings</h3>
            <label class="setting-label">
              <input id="proxyToggleSidebar" type="checkbox" />
              <span>Enable Proxy</span>
            </label>
            <div class="proxy-group">
              <input id="proxyHostSidebar" type="text" placeholder="Proxy host" class="setting-input" />
              <input id="proxyPortSidebar" type="text" placeholder="Port" class="setting-input" />
              <button id="applyProxySidebar" class="setting-btn">Apply</button>
            </div>
          </div>

          <div class="setting-group">
            <h3>Data Management</h3>
            <button id="clearCacheSidebar" class="setting-btn danger">Clear Cache & Cookies</button>
          </div>
        </div>

        <!-- EXTENSIONS TAB -->
        <div class="sidebar-content" id="extensions-tab">
          <div class="extensions-header">
            <h3>Extensions</h3>
            <button id="installExtension" class="setting-btn">+ Install</button>
          </div>
          <div id="extensionsList" class="extensions-list">
            <p class="empty-message">No extensions installed</p>
          </div>
        </div>

        <!-- BOOKMARKS TAB -->
        <div class="sidebar-content" id="bookmarks-tab">
          <h3>Bookmarks</h3>
          <div id="bookmarksList" class="bookmarks-list">
            <p class="empty-message">No bookmarks</p>
          </div>
        </div>

        <!-- ADVANCED TAB -->
        <div class="sidebar-content" id="advanced-tab">
          <div class="setting-group">
            <h3>Browser Info</h3>
            <p>Me Browser v1.0</p>
            <p id="browserInfo"></p>
          </div>
          <div class="setting-group">
            <h3>Storage</h3>
            <button id="clearAllData" class="setting-btn danger">Clear All Data</button>
          </div>
        </div>
      </aside>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>

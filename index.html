<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Me Browser</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="toolbar">
      <div class="nav-bar">
        <div class="nav-controls">
          <button id="backButton" title="Back" class="nav-btn">←</button>
          <button id="forwardButton" title="Forward" class="nav-btn">→</button>
          <button id="reloadButton" title="Reload" class="nav-btn">⟳</button>
          <button id="homeButton" title="Home" class="nav-btn">⌂</button>
        </div>
        <input id="addressBar" type="text" placeholder="Search or enter URL..." autocomplete="off" />
        <button id="goButton" class="go-btn">Go</button>
        <div id="loadingSpinner" class="spinner hidden"></div>
      </div>

      <div class="tabs-bar">
        <div id="tabsContainer" class="tabs-container"></div>
        <button id="newTabButton" class="new-tab-btn">+</button>
      </div>

      <div class="settings-bar">
        <div class="settings-group">
          <label class="checkbox-label">
            <input id="adBlockToggle" type="checkbox" />
            <span>Ad Block</span>
          </label>
          <label class="checkbox-label">
            <input id="trackingToggle" type="checkbox" />
            <span>Tracking</span>
          </label>
          <label class="checkbox-label">
            <input id="proxyToggle" type="checkbox" />
            <span>Proxy</span>
          </label>
        </div>

        <div class="proxy-inputs">
          <input id="proxyHost" type="text" placeholder="Host" class="proxy-input" />
          <input id="proxyPort" type="text" placeholder="Port" class="proxy-input" />
          <button id="applyProxyButton" class="settings-btn">Apply</button>
        </div>

        <button id="clearCacheButton" class="settings-btn">Clear Cache</button>

        <div class="bookmark-group">
          <button id="bookmarkButton" class="settings-btn">☆ Bookmark</button>
          <select id="bookmarkList" class="bookmark-select">
            <option value="">Bookmarks</option>
          </select>
        </div>

        <button id="extensionsButton" class="settings-btn">🧩 Extensions</button>
        <button id="privateWindowButton" class="private-btn" title="Open Private Window">🔒 Private</button>

        <span id="statusText" class="status-text"></span>
      </div>
    </header>

    <div id="webViewsContainer" class="webviews-container"></div>

    <div id="extensionsModal" class="extensions-modal hidden">
      <div class="extensions-dialog">
        <div class="extensions-dialog-header">
          <div>
            <h2>Extensions</h2>
            <p>Install local packages, manage permissions, and configure bundled add-ons.</p>
          </div>
          <div class="extensions-dialog-actions">
            <button id="installZipButton" class="settings-btn">Install .zip</button>
            <button id="closeExtensionsButton" class="settings-btn">Close</button>
          </div>
        </div>

        <div class="extensions-layout">
          <section class="extensions-column">
            <h3>Installed</h3>
            <div id="installedExtensionsList" class="extensions-list"></div>

            <h3>Marketplace</h3>
            <div id="marketplaceExtensionsList" class="extensions-list"></div>
          </section>

          <section class="extensions-detail">
            <h3 id="extensionDetailName">Select an extension</h3>
            <p id="extensionDetailMeta" class="extension-detail-meta"></p>
            <p id="extensionDetailPermissions" class="extension-detail-permissions"></p>
            <p id="extensionDetailStats" class="extension-detail-stats"></p>
            <div id="extensionActions" class="extension-actions"></div>
            <iframe id="extensionSettingsFrame" class="extension-settings-frame" sandbox=""></iframe>
            <label class="extension-settings-label" for="extensionSettingsEditor">Config JSON</label>
            <textarea id="extensionSettingsEditor" class="extension-settings-editor" spellcheck="false"></textarea>
            <button id="saveExtensionSettingsButton" class="settings-btn">Save Extension Settings</button>
          </section>
        </div>
      </div>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>

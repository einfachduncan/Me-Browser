<section>
  <h3>Advanced Ad-Blocker</h3>
  <p>Uses block patterns, whitelist entries, and curated filter list names stored in the extension config.</p>
  <ul>
    <li><strong>blockPatterns</strong>: wildcard patterns that should be blocked</li>
    <li><strong>whitelist</strong>: URLs or domains that should never be blocked</li>
    <li><strong>filterLists</strong>: enabled list labels for the UI</li>
  </ul>
</section>
